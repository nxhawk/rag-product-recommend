# RAG stack - umbrella Compose file.
#
# The stack is split by concern into compose.*.yml files, pulled together here
# with Compose's `include`. `docker compose up` from this folder still starts
# everything as one project (one network, merged volumes), and cross-file
# `depends_on` works because all services share the same model.
#
#   compose.core.yml        app + postgres + redis          (API + datastores)
#   compose.search.yml      elasticsearch + kibana          (keyword index + UI)
#   compose.cdc.yml         kafka + debezium + kafka-ui + sync workers
#   compose.monitoring.yml  prometheus + grafana + exporters
#
# To extend the stack, add a compose.<concern>.yml and one line below.
# All files live in this folder, so relative paths (build context `..`,
# `../.env`, `../data`, `./prometheus/...`) resolve the same in every file.
#
# Requires Docker Compose v2.20+ (the `include` element).
# Dev credentials only - real deployments must read secrets from env/vault.
#
# Full data flow (see docs/architecture/data-flow.md):
#   postgres (source of truth + pgvector) --WAL--> debezium connect --> kafka
#   kafka --> indexer-worker --> elasticsearch (keyword/BM25 index)
#   kafka --> embedding-worker --> pgvector (semantic index)
#   app: keyword branch reads elasticsearch, semantic branch reads pgvector.
# Observability (docs/deployment/monitoring.md):
#   app + *-exporter expose /metrics --scrape--> prometheus --query--> grafana

include:
  - compose.core.yml
  - compose.search.yml
  - compose.cdc.yml
  - compose.monitoring.yml
