# Change-Data-Capture pipeline: Kafka (KRaft) + Debezium (connect) stream row
# changes from Postgres' `product_catalog` to the two sync workers, which rebuild
# the search indexes. Kafka UI inspects it all. Included by docker-compose.yml.

# Shared config for the two sync workers (they differ only in role/target/deps).
# YAML anchors are file-local; adding a third worker = one more block that
# merges this template with `<<: *sync-worker`.
x-sync-worker: &sync-worker
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  # Healthy while the heartbeat file is fresh (<30s). start_period covers the
  # first `uv sync` build + the startup wait-for-dependency backoff.
  healthcheck:
    test: ["CMD-SHELL", "test -f /tmp/worker.heartbeat && [ $(( $(date +%s) - $(stat -c %Y /tmp/worker.heartbeat) )) -lt 30 ]"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 180s

services:
  kafka:
    image: apache/kafka:3.7.2
    environment:
      # Single-node KRaft (no ZooKeeper).
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Single-broker defaults for the internal topics.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Fixed cluster id so the data volume survives restarts.
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 20

  connect:
    image: debezium/connect:2.7.3.Final
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: rag-connect
      CONFIG_STORAGE_TOPIC: rag_connect_configs
      OFFSET_STORAGE_TOPIC: rag_connect_offsets
      STATUS_STORAGE_TOPIC: rag_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # One-shot: registers (or updates) the Debezium connector, then exits.
  # PUT /connectors/{name}/config is idempotent - safe on every `up`.
  connect-init:
    image: curlimages/curl:8.8.0
    volumes:
      - ./debezium:/config:ro
    # List form + literal block (|): newlines are preserved, so the shell
    # line-continuations below work. Do NOT use a folded scalar (>) here - it
    # turns each "\" + newline into "\ " (an escaped space) and breaks curl.
    entrypoint:
      - sh
      - -c
      - |
        until curl -sf http://connect:8083/connectors > /dev/null; do
          echo 'waiting for kafka connect...'
          sleep 3
        done
        curl -sf -X PUT http://connect:8083/connectors/product-catalog-connector/config \
          -H 'Content-Type: application/json' \
          -d @/config/product-catalog-connector.json \
          && echo 'debezium connector registered'
    depends_on:
      connect:
        condition: service_healthy
    restart: "no"

  # Kafka UI - web dashboard to browse topics, messages, consumer lag and the
  # Debezium connector. Pointed at the broker and Kafka Connect. Open
  # http://localhost:8080 (no login - dev stack). Read-only for the data itself:
  # the CDC topics are rebuilt from Postgres, so inspect here, don't hand-produce.
  kafka-ui:
    image: kafbat/kafka-ui:v1.4.2
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: rag
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      # Surface the Debezium connector under the same cluster view.
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
    depends_on:
      kafka:
        condition: service_healthy
      connect:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  indexer-worker:
    <<: *sync-worker
    command: ["uv", "run", "python", "scripts/sync_worker.py", "--role", "indexer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
      # Worker writes this file every poll; the healthcheck reads its age.
      WORKER_HEARTBEAT_FILE: /tmp/worker.heartbeat
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  embedding-worker:
    <<: *sync-worker
    command: ["uv", "run", "python", "scripts/sync_worker.py", "--role", "embedder"]
    env_file:
      - ../.env  # embedding provider API key
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_products
      WORKER_HEARTBEAT_FILE: /tmp/worker.heartbeat
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  kafkadata:
