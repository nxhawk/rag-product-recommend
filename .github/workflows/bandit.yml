name: Bandit (Python security lint)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "30 6 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # Scan application code. Tests are excluded (asserts are expected there).
      # -ll = report only MEDIUM+ severity, -ii = only MEDIUM+ confidence,
      # to keep signal high on an existing codebase.
      - name: Run bandit
        run: uvx bandit -r src api scripts -ll -ii
